<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Game App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🤖 AI Game App</h1>

<div id="menu">
  <button onclick="showSection('tic')">Tic Tac Toe</button>
  <button onclick="showSection('chess')">Chess</button>
  <button onclick="showSection('quiz')">Quiz</button>
  <button onclick="showSection('number')">Guess My Number</button>
</div>

<div id="tic" class="game hidden">
  <h2>Tic Tac Toe</h2>
  <div id="ttt-board"></div>
  <button onclick="resetTTT()">Reset</button>
</div>

<div id="chess" class="game hidden">
  <h2>Chess</h2>
  <div id="chess-board"></div>
  <button onclick="resetChess()">Reset</button>
</div>

<div id="quiz" class="game hidden">
  <h2>Math Quiz</h2>
  <p id="quiz-question"></p>
  <input id="quiz-answer" placeholder="Your answer">
  <button onclick="checkQuiz()">Submit</button>
  <p id="quiz-result"></p>
</div>

<div id="number" class="game hidden">
  <h2>Guess My Number (1–100)</h2>
  <input type="number" id="guess">
  <button onclick="checkGuess()">Guess</button>
  <p id="numResult"></p>
</div>

<script src="script.js"></script>
</body>
</html>
